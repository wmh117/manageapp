<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <link rel="stylesheet" href="/static/plugins/bootstrap-3.4.1/css/bootstrap.css">
    <style>
        .account {
            width: 400px;
            margin: 100px auto;
            padding: 20px 40px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 5px 20px #aaa;
        }
        .account h2 { text-align: center; margin-bottom: 20px; }
        .error-msg { color: red; position: absolute; font-size: 12px; }
    </style>
</head>
<body>
<div class="account">
    <h2>用户登录</h2>
    <form method="post" novalidate>
        {% csrf_token %}

        <div class="form-group">
            <label>用户名</label>
            <br>
            {{form.username}}
            <br>
            <span style="color:red">{{ form.username.errors.0 }}</span>
<!--            <input type="text" name="user" class="form-control" placeholder="用户名" required>-->
        </div>

        <div class="form-group">
            <label>密码</label>
            <br>
            {{form.password}}
            <br>
            <span  style="color:red">{{ form.password.errors.0 }}</span>

<!--            <input type="password" name="pwd" class="form-control" placeholder="密码" required>-->
        </div>
        <br>
        <button type="submit" class="btn btn-primary btn-block">登 录</button>

        <div style="margin-top: 10px">

            <span class="error-msg">{{ error_msg }}</span>
        </div>
    </form>
</div>
</body>
</html>
